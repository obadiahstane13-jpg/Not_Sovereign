<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sector 16 — Inventory Control</title>
<style>
  :root{ --bg:#100d09; --panel:#181410; --line:#2c241a; --ink:#f0e9dd; --dim:#9a8c75; --acc:#ffb347; }
  *{box-sizing:border-box;margin:0}
  body{font-family:ui-monospace,Consolas,monospace;background:var(--bg);color:var(--ink);padding:28px}
  header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:20px}
  h1{font-size:17px;letter-spacing:.1em}h1 b{color:var(--acc)}
  .warn{font-size:11px;color:#100d09;background:var(--acc);padding:4px 10px;border-radius:4px;font-weight:700}
  .bar{display:flex;gap:10px;margin-bottom:16px}
  input{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:6px;color:var(--ink);padding:9px 12px;font:inherit}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--line)}
  th{color:var(--dim);font-weight:400;text-transform:uppercase;font-size:11px;letter-spacing:.08em}
  .qty{color:var(--acc);text-align:right}
  .st{font-size:11px;padding:2px 8px;border-radius:99px;border:1px solid var(--line)}
  .ok{color:#7CFC9B}.low{color:#ffd166}.cls{color:#ff7a7a}
  footer{margin-top:20px;color:var(--dim);font-size:11px}
</style>
</head>
<body>
  <header>
    <h1>SECTOR&nbsp;16 // <b>INVENTORY CONTROL</b></h1>
    <span class="warn">CLEARANCE: STANE-EYES-ONLY</span>
  </header>
  <div class="bar"><input id="q" placeholder="filter part number / designation…" /></div>
  <table>
    <thead><tr><th>part #</th><th>designation</th><th>bay</th><th>status</th><th class="qty">on hand</th></tr></thead>
    <tbody id="rows"></tbody>
  </table>
  <footer>sector-16 WMS · last reconciliation 03:14 · do not export</footer>
<script>
  const data=[
    ["JN-9X","Jericho launch assembly","B-04","ok",6],
    ["RT-1A","Arc cell, palm-scale prototype","B-01","cls",1],
    ["EX-77","Exo-frame actuator (heavy)","C-12","low",12],
    ["AM-115","Guided munition, 115mm","A-09","ok",480],
    ["TR-RNG","Crate, unmarked — Ten Rings transfer","D-00","cls",3],
    ["PWR-44","High-yield power coupling","C-03","ok",58],
    ["SHL-2","Reactive armor plating","A-02","low",24],
    ["IM-CORE","Large-scale reactor core (dev)","B-16","cls",1],
  ];
  const rows=document.getElementById('rows'), q=document.getElementById('q');
  const stClass={ok:'ok',low:'low',cls:'cls'}, stText={ok:'in stock',low:'low',cls:'classified'};
  function render(f=''){
    rows.innerHTML='';
    data.filter(d=>(d[0]+d[1]).toLowerCase().includes(f.toLowerCase())).forEach(d=>{
      const tr=document.createElement('tr');
      tr.innerHTML=`<td>${d[0]}</td><td>${d[1]}</td><td>${d[2]}</td><td><span class="st ${stClass[d[3]]}">${stText[d[3]]}</span></td><td class="qty">${d[4]}</td>`;
      rows.appendChild(tr);
    });
  }
  q.oninput=()=>render(q.value); render();
</script>
</body>
</html>
